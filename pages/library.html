<link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
</head>
<body>
<nav class="site-nav">
  <div class="container nav-inner">
    <a class="brand" href="../index.html"><span class="brand-mark">EM</span><span>EM Learning Studio</span></a>
    <div class="nav-links">
      <a href="../pages/mathematics.html">Математика</a>
      <a href="../pages/kmit.html">КМИТ</a>
      <a href="../pages/it.html">ИТ</a>
      <a href="../pages/bdp.html">БДП</a>
      <a href="../pages/interdisciplinary.html">Интердисциплинарни</a>
      <a href="../pages/projects.html">Проекти</a>
    </div>
    <a class="primary-btn nav-button" href="../pages/library.html">🎮 Библиотека</a>
  </div>
</nav>

<header class="page-hero">
  <div class="container">
    <span class="eyebrow"><strong>EM</strong> Learning Studio</span>
    <h1>Библиотека с учебни комплекти</h1>
    <p>Търси по заглавие, предмет, клас или ключова дума.</p>
  </div>
</header>

<section class="library-section">
  <div class="container">
    <div class="library-toolbar">
      <input id="resourceSearch" type="search" placeholder="Търси ресурс...">
      <select id="subjectFilter">
        <option value="all">Всички направления</option>
        <option value="mathematics">Математика</option>
        <option value="kmit">КМИТ</option>
        <option value="it">Информационни технологии</option>
        <option value="bdp">БДП</option>
        <option value="interdisciplinary">Интердисциплинарни</option>
      </select>
      <select id="gradeFilter">
        <option value="all">Всички класове</option>
        <option value="5">5. клас</option>
        <option value="6">6. клас</option>
        <option value="7">7. клас</option>
        <option value="8">8. клас</option>
        <option value="9">9. клас</option>
        <option value="10">10. клас</option>
      </select>
    </div>
    <div id="resourceGrid" class="resource-cards"></div>
    <div id="resourceEmpty" class="empty hidden">Няма намерени ресурси.</div>
  </div>
</section>

<footer class="site-footer">
  <div class="container footer-inner">
    <div><strong>EM Learning Studio</strong><br><small>Учи. Играй. Побеждавай.</small></div>
    <div><small>Автор: Елена Маврова-Ненкова · © 2026</small></div>
  </div>
</footer>
<script src="../js/config.js"></script>
<script src="../js/platform.js"></script>
